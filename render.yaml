services:
  - type: web
    name: palm-blessing-web
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: HOST
        value: 0.0.0.0
      - key: PALM_BLESSING_DATA_DIR
        value: /var/data/palm-blessing
      - key: MAX_BODY_BYTES
        value: "8388608"
    disk:
      name: palm-blessing-data
      mountPath: /var/data
      sizeGB: 1

